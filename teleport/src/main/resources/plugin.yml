name: Teleport
version: 1.1.0
main: com.ntust.camp.teleport.TeleportPlugin
api-version: 1.18
description: Restricted flat teleport — 3 block range limit
author: NTUST_CSIE_CAMP
website: https://github.com/WuSandWitch/NTUST-CSIE-CAMP-vulnerable-plugins

commands:
  tp2:
    description: Teleport by relative offset (flat plane, max 3 blocks)
    usage: /tp2 <dx> <dz>

permissions:
  teleport.use:
    description: Allows using /tp2 command
    default: true
